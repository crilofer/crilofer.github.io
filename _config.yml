about_content: | # this will include new lines to allow paragraphs
  Engineering leader with <mark>12+ years</mark> in tech and <mark>6+ years</mark> leading and scaling engineering teams in <mark>Fintech</mark>. Currently leading <mark>AI Engineering</mark> at Tymit, shipping customer-facing AI products and internal AI tooling that accelerate the business.

  Track record of taking products from zero to scale: <mark>Employee #1</mark> at Tymit (early monolith to microservices on AWS), a <mark>25-engineer</mark> org at Baraka (YC S21), and a <mark>10-engineer</mark> lending platform at Wio Bank built from scratch. Comfortable operating across product, data, commercial and exec teams, and owning technical strategy end-to-end in regulated environments.

  Focused on <mark>high-availability distributed systems</mark>, <mark>AI-native workflows</mark>, and growing strong engineering cultures through hiring, mentoring and clear technical direction.

