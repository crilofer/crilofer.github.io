      - layout: left
        title: Tymit
        sub_title: Head of AI Engineering
        contract: Full-time
        caption: July 2025 - Present
        link: https://tymit.com
        link_text: Tymit
        location: Dubai (United Arab Emirates)
        quote: >
          The credit card, reinvented. A Fintech bringing financial wellness to customers.
        description: | # this will include new lines to allow paragraphs
          Leading Tymit's **AI Engineering** practice across customer-facing AI products and internal AI tooling. Setting technical direction and staying hands-on in architecture and code for the most critical flows; partnering with Product, Data, Commercial and the exec team on the AI strategy.

          - Shipped **customer-facing multi-agent systems** in the Tymit product, powering self-service and in-app decisioning, with end-to-end evaluation, tracing and regression testing before every production rollout.
          - Designing and building a **proprietary Agentic Memory manager** to tackle one of the hardest problems in production agents: context management across long-running, multi-turn and multi-agent conversations. Coordinates short-term working memory with long-term episodic and semantic memory, and assembles retrieval-augmented context within strict token budgets — keeping agents coherent across sessions without blowing cost or latency.
          - Built internal **developer-experience agents** that automate repetitive work across the SDLC, measurably reducing time-to-market and freeing engineers for higher-leverage work.
          - Drove the **agentisation of internal operations** — replacing manual workflows in Support, Ops and Engineering with agents integrated into existing systems.
          - Own the AI technical roadmap end-to-end: foundation-model evaluation and routing, orchestration stack, guardrails, evals and observability, and the AI Engineering hiring plan.

